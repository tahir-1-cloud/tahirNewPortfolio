<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html,
    body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background: #0b0f19;
    }

    .frame-wrapper {
        position: relative;
        width: 100%;
        height: 100vh;
        overflow: hidden;
        background: #0b0f19;
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
    }

    /* Floating WhatsApp Button */
    .hide-badge {
        position: fixed;
        right: 24px;
        bottom: 24px;
        z-index: 9999;
    }

    .whatsapp-btn {
        width: 62px;
        height: 62px;
        display: flex;
        align-items: center;
        justify-content: center;

        background: rgba(255, 255, 255, 0.95);
        border-radius: 50%;
        padding: 10px;

        box-shadow:
            0 10px 30px rgba(0, 0, 0, 0.25),
            0 0 0 6px rgba(37, 211, 102, 0.12);

        transition:
            transform 0.3s ease,
            box-shadow 0.3s ease;
    }

    .whatsapp-btn:hover {
        transform: scale(1.12) translateY(-4px);

        box-shadow:
            0 16px 35px rgba(0, 0, 0, 0.3),
            0 0 0 10px rgba(37, 211, 102, 0.16);
    }

    .whatsapp-btn:active {
        transform: scale(0.96);
    }

    .whatsapp-btn svg {
        width: 100%;
        height: 100%;
        display: block;
    }

    /* Mobile Responsive */
    @media (max-width: 600px) {
        .hide-badge {
            right: 16px;
            bottom: 16px;
        }

        .whatsapp-btn {
            width: 56px;
            height: 56px;
        }
    }
</style>
