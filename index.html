<title>My Portfolio</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html,
    body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b0f19;
    }

    .frame-wrapper {
        position: relative;
        width: 100%;
        height: 100vh;
        overflow: hidden;
        background: #0b0f19;
    }

    /*
     * Hercules "Built with Hercules" badge hide/crop
     *
     * iframe is slightly enlarged and moved down.
     * This hides the bottom badge outside the visible area.
     */
    iframe {
        position: absolute;

        width: 100%;
        height: calc(100% + 80px);

        top: -80px;
        left: 0;

        border: none;
        display: block;
    }

    /* WhatsApp Button */
    .whatsapp-btn {
        position: fixed;
        right: 25px;
        bottom: 25px;
        z-index: 999999;

        width: 60px;
        height: 60px;

        display: flex;
        align-items: center;
        justify-content: center;

        padding: 10px;

        background: #ffffff;
        border-radius: 50%;

        box-shadow:
            0 8px 25px rgba(0, 0, 0, 0.25),
            0 0 0 6px rgba(37, 211, 102, 0.12);

        transition: all 0.3s ease;
    }

    .whatsapp-btn:hover {
        transform: scale(1.1) translateY(-3px);

        box-shadow:
            0 14px 30px rgba(0, 0, 0, 0.3),
            0 0 0 9px rgba(37, 211, 102, 0.15);
    }

    .whatsapp-btn svg {
        width: 100%;
        height: 100%;
    }

    @media (max-width: 600px) {
        .whatsapp-btn {
            right: 16px;
            bottom: 16px;

            width: 56px;
            height: 56px;
        }
    }
</style>
